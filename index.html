<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>

body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#ffd6e7,#d6f0ff);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    text-align:center;
    width:300px;
}

h2{
    color:#ff6fa5;
}

input{
    width:100%;
    padding:10px;
    margin-top:15px;
    border-radius:10px;
    border:1px solid #eee;
}

button{
    width:100%;
    margin-top:20px;
    padding:10px;
    border:none;
    border-radius:20px;
    background:#ff8fb8;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ff5c9a;
}

</style>
</head>

<body>

<div class="login-box">

<h2>Connexion 💖</h2>

<input type="text" placeholder="Nom d'utilisateur">

<input type="password" placeholder="Mot de passe">

<button onclick="login()">Se connecter</button>

</div>

<script>

function login(){

window.location.href="home.html"

}

</script>

</body>
</html>
